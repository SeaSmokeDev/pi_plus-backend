# Configuración de la aplicación
spring.application.name=api-pi-plus-tfg

# Configuración del Apache Tomcat Embedded
server.servlet.context-path=/bdproyecto
#server.port=8080

# Configuración de la base de datos (H2 en fichero)
spring.datasource.url=jdbc:h2:file:./datos/proyecto
# spring.datasource.url=jdbc:h2:file:./datos/empleados;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (accesible en http://localhost:8080/.../h2-console )
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true
spring.h2.console.settings.trace=false

# Configuración de conexión MySQL
# spring.datasource.url=jdbc:mysql://localhost:3306/bdempresa?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
# spring.datasource.username=root
# spring.datasource.password=1234
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver



# Configuración de conexión JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=false

# Carga inical de datos usando archivos .sql
# => always     =>siempre
# => embedded   =>solo para H2 en memoria
# => never      =>nunca
spring.sql.init.mode=always
# spring.sql.init.mode=never
spring.sql.init.continue-on-error=true

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha